  설정 안내 (원장님 꼭 읽어주세요)

     (테스트/소규모 운영용 간단 규칙입니다 - 필요시 나중에 강화하세요)

     rules_version = '2';
     service cloud.firestore {
       match /databases/{database}/documents {
         match /juniper_{collection}/{doc} {
           allow read, write: if true;
         }
       }
     }

  3) 관리자 비밀번호는 아래 ADMIN_PASSWORD 값을 원하는 값으로 바꿔서 사용하세요.

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

/* ============================================================
   FIREBASE CONFIG - 여기를 본인 프로젝트 값으로 교체하세요
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCb5pipY3Q1dl6BxpP7ZmUU3hbEj7Q1_Qg",
  authDomain: "drum-practice-room.firebaseapp.com",
  projectId: "drum-practice-room",
  storageBucket: "drum-practice-room.firebasestorage.app",
  messagingSenderId: "445111225694",
  appId: "1:445111225694:web:571c88b2b10ff83931d3cf"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const FIREBASE_NOT_CONFIGURED = firebaseConfig.apiKey === "YOUR_API_KEY";

function withTimeout(promise, ms=12000){
  return Promise.race([
    promise,
    new Promise((_,reject)=> setTimeout(()=> reject(new Error('TIMEOUT')), ms))
  ]);
}

const ADMIN_PASSWORD = "admin6537"; // 원장님 비밀번호 - 원하는 값으로 변경하세요

const COL_STUDENTS = "juniper_students";
const COL_RESERVATIONS = "juniper_reservations";
const COL_NOTICES = "juniper_notices";

/* ============================================================
   HELPERS
   ============================================================ */
const DOW = ['일','월','화','수','목','금','토'];
const ROOMS = [1,2,3,4];
const ROOM_LABELS = { 1:'1번', 2:'2번', 3:'3번', 4:'버스킹드럼' };
function roomLabel(r){ return ROOM_LABELS[Number(r)] || (r+'번'); }
function roomFullLabel(r){ return Number(r)===4 ? roomLabel(r) : roomLabel(r)+'방'; }
function getAvailableRooms(type){ return type === 'exam' ? [1,2,3,4] : [1,2,3]; }

function pad(n){ return n < 10 ? '0'+n : ''+n; }
function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function addDays(d,n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function toMin(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }
function toTime(min){ const h = Math.floor(min/60), m = min%60; return pad(h)+':'+pad(m); }
function fmtKDate(d){ return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+DOW[d.getDay()]+')'; }

function getOperatingHours(dateObj){
  const day = dateObj.getDay();
  if(day === 0) return null; // 일요일 휴무
  if(day === 6) return { start:'13:00', end:'19:00' };
  return { start:'13:00', end:'22:00' };
}

function generateHalfHourSlots(hours){
  if(!hours) return [];
  const slots = [];
  let cur = toMin(hours.start);
  const end = toMin(hours.end);
  while(cur < end){ slots.push(toTime(cur)); cur += 30; }
  return slots;
}

function hasOverlap(reservations, room, start, end){
  const s = toMin(start), e = toMin(end);
  return reservations.some(r => Number(r.room) === Number(room) && toMin(r.start) < e && s < toMin(r.end));
}

// 예약을 30분 단위 슬롯 리스트로 펼치기: [{room, time}, ...]
function expandToSlots(resList){
  const list = [];
  resList.forEach(r=>{
    let cur = toMin(r.start); const end = toMin(r.end);
    while(cur < end){ list.push({ room:Number(r.room), time:toTime(cur) }); cur += 30; }
  });
  return list;
}

// 슬롯을 연속 구간(run)으로 묶기: [{room, start, end}, ...]
function groupRuns(slots){
  const byRoom = {};
  slots.forEach(s=>{ (byRoom[s.room] = byRoom[s.room] || []).push(toMin(s.time)); });
  const runs = [];
  Object.keys(byRoom).forEach(room=>{
    const times = byRoom[room].sort((a,b)=>a-b);
    let runStart = times[0], prev = times[0];
    for(let k=1;k<=times.length;k++){
      if(k < times.length && times[k]-prev === 30){ prev = times[k]; continue; }
      runs.push({ room:Number(room), start:toTime(runStart), end:toTime(prev+30) });
      if(k < times.length){ runStart = times[k]; prev = times[k]; }
    }
  });
  return runs;
}

// 특정 학생의 하루 예약 규칙: 취미생 1일 1시간(2칸) / 입시생 1일 3시간(6칸), 한 방에서 연속 최대 2시간(4칸)
// 4칸을 연속으로 쓴 뒤엔 같은 방은 최소 30분(1칸) 휴식 후에만 추가 선택 가능, 다른 방은 아무 시간에나 선택 가능 (총 한도 내에서)
function dailyLimitSlots(type){ return type === 'exam' ? 6 : 2; }

function canAddSlot(type, existingMySlots, room, time){
  const combined = existingMySlots.concat([{ room, time }]);
  if(combined.length > dailyLimitSlots(type)) return false;
  const times = combined.filter(s=>s.room===room).map(s=>toMin(s.time)).sort((a,b)=>a-b);
  const target = toMin(time);
  let idx = times.indexOf(target);
  let runLen = 1, i = idx, j = idx;
  while(i > 0 && times[i]-times[i-1] === 30){ runLen++; i--; }
  while(j < times.length-1 && times[j+1]-times[j] === 30){ runLen++; j++; }
  return runLen <= 4;
}

/* ============================================================
   STUDENT: RESERVE TAB
   ============================================================ */
function ReserveTab({ student }){
  const availableRooms = useMemo(()=> getAvailableRooms(student.type), [student.type]);
  const [selDate, setSelDate] = useState(fmtDate(new Date()));
  const [selRoom, setSelRoom] = useState(availableRooms[0]);
  const [dayReservations, setDayReservations] = useState([]);
  const [loading, setLoading] = useState(true);
  const [draftSlots, setDraftSlots] = useState([]); // [{room,time}] 아직 저장 안 된 선택
  const [msg, setMsg] = useState('');
  const [submitting, setSubmitting] = useState(false);

  const dateObj = useMemo(()=> new Date(selDate+'T00:00:00'), [selDate]);
  const hours = useMemo(()=> getOperatingHours(dateObj), [dateObj]);
  const slots = useMemo(()=> generateHalfHourSlots(hours), [hours]);
  const limitSlots = dailyLimitSlots(student.type);

  const dates = useMemo(()=>{
    const arr = [];
    let d = new Date(); d.setHours(0,0,0,0);
    for(let i=0; i<14 && arr.length<12; i++){
      const cand = addDays(d,i);
      if(cand.getDay() !== 0) arr.push(cand);
    }
    return arr;
  }, []);

  useEffect(()=>{
    if(!availableRooms.includes(selRoom)) setSelRoom(availableRooms[0]);
  }, [availableRooms]);

  useEffect(()=>{
    setLoading(true);
    const unsub = db.collection(COL_RESERVATIONS).where('date','==',selDate)
      .onSnapshot(snap => {
        setDayReservations(snap.docs.map(d=>({ id:d.id, ...d.data() })));
        setLoading(false);
      }, err => { console.error(err); setLoading(false); });
    return () => unsub();
  }, [selDate]);

  useEffect(()=>{ setDraftSlots([]); setMsg(''); }, [selDate]);

  const existingSlots = useMemo(()=> expandToSlots(dayReservations.filter(r=>r.studentId===student.id)), [dayReservations, student.id]);
  const usedSlots = existingSlots.length + draftSlots.length;
  const remainMin = Math.max(0, (limitSlots - usedSlots) * 30);

  function slotState(room, time){
    const s = toMin(time), e = s + 30;
    const isOther = dayReservations.some(r => Number(r.room)===room && r.studentId!==student.id && toMin(r.start)<e && s<toMin(r.end));
    if(isOther) return 'other';
    if(existingSlots.some(sl=>sl.room===room && sl.time===time)) return 'mine';
    if(draftSlots.some(sl=>sl.room===room && sl.time===time)) return 'selected';
    const ok = canAddSlot(student.type, existingSlots.concat(draftSlots), room, time);
    return ok ? 'free' : 'blocked';
  }

  function toggleSlot(room, time){
    const state = slotState(room, time);
    if(state === 'free'){
      setDraftSlots(prev=>[...prev, { room, time }]);
      setMsg('');
    } else if(state === 'selected'){
      setDraftSlots(prev=>prev.filter(sl=>!(sl.room===room && sl.time===time)));
    }
  }

  const draftRuns = useMemo(()=> groupRuns(draftSlots), [draftSlots]);

  async function submitAll(){
    if(draftSlots.length===0) return;
    setSubmitting(true); setMsg('');
    try{
      const fresh = await db.collection(COL_RESERVATIONS).where('date','==',selDate).get();
      const freshList = fresh.docs.map(d=>({id:d.id, ...d.data()}));
      const conflict = draftSlots.some(sl=>{
        const s = toMin(sl.time), e = s+30;
        return freshList.some(r=>r.studentId!==student.id && Number(r.room)===sl.room && toMin(r.start)<e && s<toMin(r.end));
      });
      if(conflict){ setMsg('방금 다른 학생이 예약해서 시간이 겹쳐요. 선택을 확인해주세요.'); setSubmitting(false); return; }

      const freshExisting = expandToSlots(freshList.filter(r=>r.studentId===student.id));
      let running = freshExisting.slice();
      for(const sl of draftSlots){
        if(!canAddSlot(student.type, running, sl.room, sl.time)){
          setMsg('예약 규칙에 맞지 않는 시간이 포함되어 있어요. 선택을 다시 확인해주세요.');
          setSubmitting(false);
          return;
        }
        running.push(sl);
      }

      const batch = db.batch();
      draftRuns.forEach(run=>{
        const ref = db.collection(COL_RESERVATIONS).doc();
        batch.set(ref, {
          studentId: student.id, studentName: student.name, studentType: student.type,
          room: run.room, date: selDate, start: run.start, end: run.end,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
      await batch.commit();
      setDraftSlots([]);
      setMsg('✅ 예약이 완료됐어요!');
    }catch(e){ setMsg('예약 중 오류가 발생했어요. 다시 시도해주세요.'); }
    setSubmitting(false);
  }

  async function cancelReservation(id){
    if(!window.confirm('예약을 취소할까요?')) return;
    await db.collection(COL_RESERVATIONS).doc(id).delete();
  }

  const upcoming = dayReservations.filter(r=>r.studentId===student.id).sort((a,b)=> toMin(a.start)-toMin(b.start));

  return (
    <div className="screen">
      <div className="eyebrow">PRACTICE ROOM</div>
      <h1 className="page-title">연습실 예약</h1>
      <p className="page-sub">{student.type==='exam' ? '입시생: 1일 최대 3시간(6칸). 한 방에서 최대 2시간(4칸) 연속 사용 후엔 같은 방은 30분 휴식, 다른 방은 언제든 이용 가능해요.' : '취미생: 1일 최대 1시간(2칸)'}</p>

      <div className="date-scroll">
        {dates.map(d=>{
          const ds = fmtDate(d);
          const isToday = ds === fmtDate(new Date());
          return (
            <div key={ds} className={"date-chip"+(ds===selDate?' active':'')+(isToday?' today':'')} onClick={()=>setSelDate(ds)}>
              <div className="dow">{DOW[d.getDay()]}</div>
              <div className="num">{d.getDate()}</div>
            </div>
          );
        })}
      </div>

      <div className="budget-bar-wrap">
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'var(--text-muted)'}}>
          <span>오늘 남은 예약 가능 시간{draftSlots.length>0 && ' (선택 반영)'}</span>
          <span style={{fontFamily:'var(--font-mono)',color:'var(--brass-bright)',fontWeight:700}}>{Math.floor(remainMin/60)}시간 {remainMin%60}분</span>
        </div>
        <div className="budget-bar-track"><div className="budget-bar-fill" style={{width: (100*usedSlots/limitSlots)+'%'}}/></div>
      </div>

      {!hours ? (
        <div className="info-box">일요일은 학원 휴무일이에요. 다른 날짜를 선택해주세요.</div>
      ) : (
        <React.Fragment>
          <div className="room-tabs">
            {availableRooms.map(r=>(
              <div key={r} className={"room-tab"+(selRoom===r?' active':'')} onClick={()=>setSelRoom(r)}>
                <div className="rn">ROOM</div>
                <div className="rt">{roomLabel(r)}</div>
              </div>
            ))}
          </div>

          <div className="card">
            <div className="card-title">{roomFullLabel(selRoom)} 현황 · {fmtKDate(dateObj)}</div>
            {loading ? <div className="loading-spin"/> : (
              <React.Fragment>
                <div className="slot-grid">
                  {slots.map(t=>{
                    const st = slotState(selRoom, t);
                    return (
                      <div key={t} className={"slot-cell "+st} onClick={()=>toggleSlot(selRoom, t)}>
                        {st!=='blocked' && t}
                      </div>
                    );
                  })}
                </div>
                <div className="legend">
                  <div className="legend-item"><div className="legend-dot" style={{background:'var(--surface-2)',border:'1px solid rgba(201,162,39,0.3)'}}/>선택 가능</div>
                  <div className="legend-item"><div className="legend-dot" style={{background:'var(--brass)'}}/>선택됨</div>
                  <div className="legend-item"><div className="legend-dot" style={{background:'var(--brass-soft)',border:'1px solid var(--brass)'}}/>내 예약</div>
                  <div className="legend-item"><div className="legend-dot" style={{background:'var(--rec-soft)',border:'1px solid var(--rec)'}}/>예약됨</div>
                  <div className="legend-item">🚫 규칙상 불가</div>
                </div>
              </React.Fragment>
            )}
            <p style={{fontSize:11.5,color:'var(--text-faint)',marginTop:10,marginBottom:0,lineHeight:1.5}}>칸을 눌러 여러 시간을 한 번에 선택할 수 있어요. 다른 방 탭으로 이동해도 선택은 유지돼요.</p>
          </div>

          {draftRuns.length > 0 && (
            <div className="card">
              <div className="card-title">선택한 예약</div>
              {draftRuns.map((run,i)=>(
                <div className="res-row" key={i}>
                  <div style={{display:'flex',alignItems:'center'}}>
                    <div className="room-badge">{roomLabel(run.room)}</div>
                    <div className="res-time">{run.start} – {run.end}</div>
                  </div>
                  <div className="cancel-x" onClick={()=>setDraftSlots(prev=>prev.filter(sl=>!(sl.room===run.room && toMin(sl.time)>=toMin(run.start) && toMin(sl.time)<toMin(run.end))))}>✕</div>
                </div>
              ))}

              {msg && <div className={msg.startsWith('✅')?'info-box':'error-box'} style={{marginTop:6}}>{msg}</div>}

              <button className="btn" style={{marginTop:10}} disabled={submitting} onClick={submitAll}>
                {submitting ? '예약 중...' : '선택한 시간 예약하기'}
              </button>
            </div>
          )}
          {draftRuns.length === 0 && msg && <div className={msg.startsWith('✅')?'info-box':'error-box'}>{msg}</div>}
        </React.Fragment>
      )}

      <div className="card">
        <div className="card-title">📅 {fmtKDate(dateObj)} 내 예약</div>
        {upcoming.length===0 ? (
          <div className="empty-state"><p>이 날 예약이 없어요.</p></div>
        ) : upcoming.map(r=>(
          <div className="res-row" key={r.id}>
            <div style={{display:'flex',alignItems:'center'}}>
              <div className="room-badge">{roomLabel(r.room)}</div>
              <div>
                <div className="res-time">{r.start} – {r.end}</div>
              </div>
            </div>
            <div className="cancel-x" onClick={()=>cancelReservation(r.id)}>✕</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function StudentEditModal({ student, onClose }){
  const [type, setType] = useState(student.type);
  const [schedule, setSchedule] = useState(student.schedule || []);
  const [newDay, setNewDay] = useState('월');
  const [newStart, setNewStart] = useState('16:00');
  const [newEnd, setNewEnd] = useState('17:00');
  const [saving, setSaving] = useState(false);

  function addSchedule(){
    setSchedule([...schedule, { day:newDay, start:newStart, end:newEnd }]);
  }
  function removeSchedule(i){
    setSchedule(schedule.filter((_,idx)=>idx!==i));
  }
  async function save(){
    setSaving(true);
    await db.collection(COL_STUDENTS).doc(student.id).update({ type, schedule });
    setSaving(false);
    onClose();
  }
  async function del(){
    if(!window.confirm(student.name+' 학생을 삭제할까요? 예약 내역은 삭제되지 않아요.')) return;
    await db.collection(COL_STUDENTS).doc(student.id).delete();
    onClose();
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-close-row">
          <div className="modal-title">{student.name}</div>
          <div className="icon-btn" onClick={onClose}>✕</div>
        </div>

        <div className="input-label">수강 유형</div>
        <div className="toggle-row" style={{marginBottom:18}}>
          <div className={"toggle-opt"+(type==='hobby'?' active':'')} onClick={()=>setType('hobby')}>취미생</div>
          <div className={"toggle-opt"+(type==='exam'?' active':'')} onClick={()=>setType('exam')}>입시생</div>
        </div>

        <div className="input-label">수업시간표</div>
        {schedule.map((s,i)=>(
          <div className="mini-add-row" key={i}>
            <div className="input" style={{flex:'0 0 44px',textAlign:'center'}}>{s.day}</div>
            <div className="input" style={{flex:1,textAlign:'center'}}>{s.start} – {s.end}</div>
            <div className="remove-chip" onClick={()=>removeSchedule(i)}>✕</div>
          </div>
        ))}

        <div className="mini-add-row" style={{marginTop:10}}>
          <select className="input" style={{flex:'0 0 66px'}} value={newDay} onChange={e=>setNewDay(e.target.value)}>
            {['월','화','수','목','금','토','일'].map(d=><option key={d} value={d}>{d}</option>)}
          </select>
          <input className="input" type="time" value={newStart} onChange={e=>setNewStart(e.target.value)} />
          <input className="input" type="time" value={newEnd} onChange={e=>setNewEnd(e.target.value)} />
        </div>
        <button className="btn btn-ghost btn-sm" style={{width:'100%',marginBottom:20}} onClick={addSchedule}>+ 수업시간 추가</button>

        <button className="btn" disabled={saving} onClick={save} style={{marginBottom:10}}>{saving?'저장 중...':'저장하기'}</button>
        <button className="btn btn-danger" onClick={del}>학생 삭제</button>
      </div>
    </div>
  );
}

function NoticeEditModal({ notice, onClose }){
  const [title, setTitle] = useState(notice?.title || '');
  const [content, setContent] = useState(notice?.content || '');
  const [important, setImportant] = useState(notice?.important || false);
  const [saving, setSaving] = useState(false);

  async function save(){
    if(!title.trim() || !content.trim()) return;
    setSaving(true);
    if(notice){
      await db.collection(COL_NOTICES).doc(notice.id).update({ title, content, important });
    } else {
      await db.collection(COL_NOTICES).add({ title, content, important, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    }
    setSaving(false);
    onClose();
  }
  async function del(){
    if(!window.confirm('이 공지를 삭제할까요?')) return;
    await db.collection(COL_NOTICES).doc(notice.id).delete();
    onClose();
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-close-row">
          <div className="modal-title">{notice ? '공지 수정' : '새 공지 작성'}</div>
          <div className="icon-btn" onClick={onClose}>✕</div>
        </div>
        <div className="input-group">
          <label className="input-label">제목</label>
          <input className="input" value={title} onChange={e=>setTitle(e.target.value)} />
        </div>
        <div className="input-group">
          <label className="input-label">내용</label>
          <textarea className="input" rows="6" value={content} onChange={e=>setContent(e.target.value)} style={{resize:'vertical'}}/>
        </div>
        <div className="checkbox-row" onClick={()=>setImportant(!important)}>
          <div className={"checkbox-box"+(important?' checked':'')}>{important && '✓'}</div>
          <span style={{fontSize:13.5}}>중요 공지로 상단 고정</span>
        </div>
        <button className="btn" disabled={saving} onClick={save} style={{marginTop:14,marginBottom:notice?10:0}}>{saving?'저장 중...':'저장하기'}</button>
        {notice && <button className="btn btn-danger" onClick={del}>삭제하기</button>}
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App(){
  const [session, setSession] = useState(undefined); // undefined = loading, null = logged out
  const [view, setView] = useState('login'); // login | adminLogin

  useEffect(()=>{
    async function restore(){
      try{
        const raw = localStorage.getItem('juniper_session');
        if(!raw){ setSession(null); return; }
        const parsed = JSON.parse(raw);
        if(parsed.type === 'admin'){ setSession({ type:'admin' }); return; }
        if(parsed.type === 'student' && parsed.studentId){
          const doc = await db.collection(COL_STUDENTS).doc(parsed.studentId).get();
          if(doc.exists){ setSession({ type:'student', student:{ id:doc.id, ...doc.data() } }); return; }
        }
        localStorage.removeItem('juniper_session');
        setSession(null);
      }catch(e){ setSession(null); }
    }
    restore();
  }, []);

  function logout(){
    localStorage.removeItem('juniper_session');
    setSession(null);
    setView('login');
  }

  if(FIREBASE_NOT_CONFIGURED){
    return (
      <div className="auth-wrap">
        <div className="auth-logo">
          <div className="logo-mark"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#C9A227" strokeWidth="1.4"/></svg></div>
          <div className="brand">설정이 필요해요</div>
          <div className="sub">SETUP REQUIRED</div>
        </div>
        <div className="error-box">
          아직 Firebase 프로젝트 설정 전이에요. 코드 상단의 <code>firebaseConfig</code> 값을 본인 Firebase 프로젝트의 실제 값으로 바꿔주셔야 회원가입/로그인이 동작해요. (지금 상태로는 "처리 중"에서 멈춰요)
        </div>
        <p style={{fontSize:12.5,color:'var(--text-muted)',lineHeight:1.7}}>
          Firebase 콘솔 → 프로젝트 설정 → 일반 → 내 앱 → SDK 설정에서 config 값을 복사해 붙여넣고, Firestore 규칙도 파일 상단 주석대로 설정한 뒤 다시 열어주세요.
        </p>
      </div>
    );
  }

  if(session === undefined){
    return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="loading-spin"/></div>;
  }
  if(session === null){
    if(view === 'adminLogin'){
      return <AdminLoginScreen onAdminLogin={()=>setSession({type:'admin'})} onBack={()=>setView('login')} />;
    }
    return <AuthScreen onStudentLogin={(student)=>setSession({type:'student', student})} onGoAdmin={()=>setView('adminLogin')} />;
  }
  if(session.type === 'admin'){
    return <AdminShell onLogout={logout} />;
  }
  return <StudentShell student={session.student} onLogout={logout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
