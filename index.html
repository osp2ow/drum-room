function NoticeEditModal({ notice, onClose }){
  const [title, setTitle] = useState(notice?.title || '');
  const [content, setContent] = useState(notice?.content || '');
  const [important, setImportant] = useState(notice?.important || false);
  const [audience, setAudience] = useState(notice?.audience || 'all');
  const [saving, setSaving] = useState(false);

  async function save(){
    if(!title.trim() || !content.trim()){ alert('제목과 내용을 모두 입력해주세요.'); return; }
    setSaving(true);
    try{
      if(notice){
        await db.collection(COL_NOTICES).doc(notice.id).update({ title, content, important, audience });
      } else {
        await db.collection(COL_NOTICES).add({ title, content, important, audience, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      }
      onClose();
    }catch(e){
      console.error(e);
      alert('공지 저장 중 오류가 발생했어요: ' + (e && e.message ? e.message : e));
      setSaving(false);
    }
  }
  async function del(){
    if(!window.confirm('이 공지를 삭제할까요?')) return;
    try{
      await db.collection(COL_NOTICES).doc(notice.id).delete();
      onClose();
    }catch(e){
      console.error(e);
      alert('공지 삭제 중 오류가 발생했어요: ' + (e && e.message ? e.message : e));
    }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-close-row">
          <div className="modal-title">{notice ? '공지 수정' : '새 공지 작성'}</div>
          <div className="icon-btn" onClick={onClose}>✕</div>
        </div>

        <div className="input-label">공지 대상</div>
        <div className="toggle-row" style={{marginBottom:18}}>
          <div className={"toggle-opt"+(audience==='all'?' active':'')} onClick={()=>setAudience('all')}>전체</div>
          <div className={"toggle-opt"+(audience==='hobby'?' active':'')} onClick={()=>setAudience('hobby')}>취미생</div>
          <div className={"toggle-opt"+(audience==='exam'?' active':'')} onClick={()=>setAudience('exam')}>입시생</div>
        </div>
        <div className="input-group">
          <label className="input-label">제목</label>
          <input className="input" value={title} onChange={e=>setTitle(e.target.value)} />
        </div>
        <div className="input-group">
          <label className="input-label">내용</label>
          <textarea className="input" rows="6" value={content} onChange={e=>setContent(e.target.value)} style={{resize:'vertical'}}/>
        </div>
        <div className="checkbox-row" onClick={()=>setImportant(!important)}>
          <div className={"checkbox-box"+(important?' checked':'')}>{important && '✓'}</div>
          <span style={{fontSize:13.5}}>중요 공지로 상단 고정</span>
        </div>
        <button className="btn" disabled={saving} onClick={save} style={{marginTop:14,marginBottom:notice?10:0}}>{saving?'저장 중...':'저장하기'}</button>
        {notice && <button className="btn btn-danger" onClick={del}>삭제하기</button>}
      </div>
    </div>
  );
}

/* ============================================================
   ADMIN: TIMETABLE TAB (전체 학생 수업 시간표 + 결석/보강 관리)
   ============================================================ */
function getMonday(offsetWeeks){
  const d = new Date(); d.setHours(0,0,0,0);
  const day = d.getDay(); // 0=일 ... 6=토
  const diff = (day===0 ? -6 : 1-day) + offsetWeeks*7;
  return addDays(d, diff);
}

function AdminTimetableTab(){
  const [students, setStudents] = useState([]);
  const [overrides, setOverrides] = useState([]);
  const [editingCell, setEditingCell] = useState(null);

  useEffect(()=>{
    const unsub = db.collection(COL_STUDENTS).orderBy('name').onSnapshot(snap=>{
      setStudents(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return ()=>unsub();
  }, []);

  const DAYS = ['월','화','수','목','금'];
  const HOURS = CLASS_HOURS; // 12:00 ~ 21:00 (시작 시간 기준)

  const weekDates = useMemo(()=>{
    const monday = getMonday(0);
    return DAYS.map((_,i)=> addDays(monday, i));
  }, []);
  const weekDateStrs = weekDates.map(fmtDate);

  // 이번주~다다음주까지 결석 예약이 가능하도록 3주 범위를 통째로 구독
  const rangeStart = fmtDate(getMonday(0));
  const rangeEnd = fmtDate(addDays(getMonday(0), 20));
  useEffect(()=>{
    const unsub = db.collection(COL_OVERRIDES)
      .where('date','>=', rangeStart).where('date','<=', rangeEnd)
      .onSnapshot(snap=>{
        setOverrides(snap.docs.map(d=>({id:d.id,...d.data()})));
      }, err=>console.error(err));
    return ()=>unsub();
  }, [rangeStart, rangeEnd]);

  function findRegular(day, hour){
    const list = [];
    students.forEach(s=>{
      (s.schedule||[]).forEach(sch=>{
        if(sch.day===day && sch.start===hour) list.push({ id:s.id, name:s.name, type:s.type });
      });
    });
    return list;
  }

  function cellData(dayIdx, hour){
    const day = DAYS[dayIdx];
    const date = weekDateStrs[dayIdx];
    const nextDate = fmtDate(addDays(weekDates[dayIdx], 7));
    const regularEntries = findRegular(day, hour);
    const regularIds = regularEntries.map(en=>en.id);
    const absenceOverrides = overrides.filter(o=> o.kind==='absence' && o.start===hour && (o.date===date || o.date===nextDate) && regularIds.includes(o.studentId));
    const makeupOverrides = overrides.filter(o=>o.kind==='makeup' && o.start===hour && (o.date===date || o.date===nextDate));
    const noteOverride = overrides.find(o=>o.kind==='note' && o.date===date && o.start===hour) || null;
    return { day, dayIdx, date, nextDate, hour, regularEntries, absenceOverrides, makeupOverrides, noteOverride };
  }

  function cellClass(cell){
    if(cell.makeupOverrides.length>0) return 'tt-cell makeup';
    if(cell.regularEntries.length>0){
      const anyAbsent = cell.regularEntries.some(en=>cell.absenceOverrides.some(a=>a.studentId===en.id));
      return anyAbsent ? 'tt-cell absent' : 'tt-cell booked';
    }
    return 'tt-cell empty';
  }

  return (
    <div className="screen">
      <div className="eyebrow">ADMIN</div>
      <h1 className="page-title">수업 시간표</h1>

      <div className="legend" style={{marginBottom:14}}>
        <div className="legend-item"><div className="legend-dot" style={{background:'var(--brass-soft)',border:'1px solid var(--brass)'}}/>정규 수업</div>
        <div className="legend-item"><div className="legend-dot" style={{background:'var(--rec)'}}/>결석</div>
        <div className="legend-item"><div className="legend-dot" style={{background:'#2E6FE8'}}/>보강</div>
      </div>

      <div className="timetable-wrap">
        <table className="timetable class-timetable">
          <colgroup>
            <col style={{width:'46px'}} />
            {DAYS.map(d=><col key={d} style={{width:'calc((100% - 46px) / 5)'}} />)}
          </colgroup>
          <thead>
            <tr>
              <th className="tt-time-h"></th>
              {DAYS.map(d=><th key={d}>{d}</th>)}
            </tr>
          </thead>
          <tbody>
            {HOURS.map(h=>(
              <tr key={h}>
                <td className="tt-time">{hourLabel12(h)}</td>
                {DAYS.map((day,i)=>{
                  const cell = cellData(i, h);
                  const cls = cellClass(cell);
                  const solidAbsent = cls === 'tt-cell absent';
                  const solidMakeup = cls === 'tt-cell makeup';
                  return (
                    <td key={i} className={cls} style={{cursor:'pointer'}} onClick={()=>setEditingCell(cell)}>
                      {cell.regularEntries.map(en=>{
                        const absenceEntries = cell.absenceOverrides.filter(a=>a.studentId===en.id).sort((a,b)=> a.date<b.date?-1:1);
                        const absent = absenceEntries.length>0;
                        const col = (solidAbsent || solidMakeup) ? '#FFFFFF' : (absent ? 'var(--rec)' : undefined);
                        const dateLabels = absenceEntries.map(a=>{ const d = new Date(a.date+'T00:00:00'); return `${d.getMonth()+1}월${d.getDate()}일 결석`; });
                        return (
                          <div key={en.id} style={{marginBottom:2}}>
                            <div className="tt-name" style={{color:col, textDecoration: absent?'line-through':'none'}}>{en.name}</div>
                            {absent ? dateLabels.map((lbl,li)=>(
                              <div key={li} className="tt-type" style={{color:col}}>{lbl}</div>
                            )) : (
                              <div className="tt-type" style={{color:col}}>{en.type==='exam'?'입시':'취미'}</div>
                            )}
                          </div>
                        );
                      })}
                      {cell.makeupOverrides.map(mo=>{
                        const d = new Date(mo.date+'T00:00:00');
                        return (
                          <div key={mo.id}>
                            <div className="tt-name" style={{color:'#FFFFFF'}}>{mo.studentName}</div>
                            <div className="tt-type" style={{color:'#FFFFFF'}}>{d.getMonth()+1}월{d.getDate()}일 보강</div>
                          </div>
                        );
                      })}
                      {cell.regularEntries.length===0 && cell.makeupOverrides.length===0 && '·'}
                      {cell.noteOverride && <div className="tt-note-dot">📝</div>}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {editingCell && <SlotOverrideModal cell={editingCell} students={students} overrides={overrides} onClose={()=>setEditingCell(null)} />}
    </div>
  );
}

function SlotOverrideModal({ cell, students, overrides, onClose }){
  const { day, dayIdx, hour, date } = cell;
  const [saving, setSaving] = useState(false);
  const [manualName, setManualName] = useState('');
  const [selectedStudentId, setSelectedStudentId] = useState('');
  const [makeupWeek, setMakeupWeek] = useState(0);
  const [noteText, setNoteText] = useState(cell.noteOverride?.note || '');

  // 최신 overrides 기준으로 항상 다시 계산 (모달을 닫지 않고도 바로 반영되도록)
  const regularEntries = cell.regularEntries;
  const WEEK_LABELS = ['이번주','다음주'];

  function weekDate(offset){
    return fmtDate(addDays(getMonday(offset), dayIdx));
  }

  const makeupOverrides = overrides.filter(o=>o.kind==='makeup' && o.start===hour && (o.date===weekDate(0) || o.date===weekDate(1)));
  const noteOverride = overrides.find(o=>o.kind==='note' && o.date===date && o.start===hour) || null;

  const dateObj = new Date(date+'T00:00:00');
  const dateLabel = `${dateObj.getMonth()+1}월 ${dateObj.getDate()}일 (${day}) ${hourLabel12(hour)}`;

  async function toggleAbsence(entry, targetDate){
    setSaving(true);
    try{
      const existing = overrides.find(o=>o.kind==='absence' && o.studentId===entry.id && o.date===targetDate && o.start===hour);
      if(existing){
        await db.collection(COL_OVERRIDES).doc(existing.id).delete();
      } else {
        await db.collection(COL_OVERRIDES).add({
          date:targetDate, day, start:hour, end:toTime(toMin(hour)+60),
          kind:'absence', studentId:entry.id, studentName:entry.name, studentType:entry.type,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    }catch(e){ alert('처리 중 오류가 발생했어요. 다시 시도해주세요.'); }
    setSaving(false);
  }

  async function addMakeup(){
    const picked = students.find(s=>s.id===selectedStudentId);
    const name = picked ? picked.name : manualName.trim();
    if(!name) return;
    const targetDate = weekDate(makeupWeek);
    setSaving(true);
    try{
      await db.collection(COL_OVERRIDES).add({
        date: targetDate, day, start:hour, end:toTime(toMin(hour)+60),
        kind:'makeup',
        studentId: picked ? picked.id : null,
        studentName: name,
        studentType: picked ? picked.type : null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      setManualName(''); setSelectedStudentId('');
    }catch(e){ alert('처리 중 오류가 발생했어요. 다시 시도해주세요.'); }
    setSaving(false);
  }

  async function removeMakeup(mo){
    setSaving(true);
    try{ await db.collection(COL_OVERRIDES).doc(mo.id).delete(); }
    catch(e){ alert('처리 중 오류가 발생했어요. 다시 시도해주세요.'); }
    setSaving(false);
  }

  async function saveNote(){
    setSaving(true);
    try{
      if(noteOverride){
        if(noteText.trim()===''){ await db.collection(COL_OVERRIDES).doc(noteOverride.id).delete(); }
        else { await db.collection(COL_OVERRIDES).doc(noteOverride.id).update({ note: noteText.trim() }); }
      } else if(noteText.trim() !== ''){
        await db.collection(COL_OVERRIDES).add({
          date, day, start:hour, end:toTime(toMin(hour)+60),
          kind:'note', note: noteText.trim(),
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      onClose();
    }catch(e){ alert('메모 저장 중 오류가 발생했어요.'); setSaving(false); }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-close-row">
          <div className="modal-title">{dateLabel}</div>
          <div className="icon-btn" onClick={onClose}>✕</div>
        </div>

        {regularEntries.length > 0 && (
          <React.Fragment>
            <div className="input-label">정규 수업 · 결석 예약</div>
            {regularEntries.map(en=>{
              const activeOffs = [0,1].filter(off=> overrides.some(o=>o.kind==='absence' && o.studentId===en.id && o.date===weekDate(off) && o.start===hour));
              const dateLabels = activeOffs.map(off=>{ const d = new Date(weekDate(off)+'T00:00:00'); return `${d.getMonth()+1}월 ${d.getDate()}일`; });
              return (
                <div key={en.id} style={{marginBottom:16}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{en.name}</div>
                  <div style={{fontSize:11.5,color: dateLabels.length ? 'var(--rec)' : 'var(--text-faint)', fontWeight: dateLabels.length?700:400, marginBottom:8}}>
                    {dateLabels.length ? dateLabels.join(', ')+' 결석' : '결석 예정 없음'}
                  </div>
                  <div className="toggle-row" style={{gap:6}}>
                    {[0,1].map(off=>{
                      const td = weekDate(off);
                      const isAbsent = overrides.some(o=>o.kind==='absence' && o.studentId===en.id && o.date===td && o.start===hour);
                      return (
                        <div key={off}
                          className={"toggle-opt"+(isAbsent?' active':'')}
                          style={Object.assign({fontSize:12,padding:'10px 4px'}, isAbsent?{borderColor:'var(--rec)',background:'var(--rec-soft)',color:'var(--rec)',fontWeight:700}:{})}
                          onClick={()=>!saving && toggleAbsence(en, td)}>
                          {WEEK_LABELS[off]} 결석
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </React.Fragment>
        )}

        <div className="input-label" style={{marginTop:regularEntries.length>0?4:0}}>보강 수업</div>
        {makeupOverrides.length > 0 && makeupOverrides.map(mo=>{
          const md = new Date(mo.date+'T00:00:00');
          return (
            <div className="list-item-row" key={mo.id} style={{cursor:'default'}}>
              <div>
                <div className="name" style={{color:'#2E6FE8'}}>{mo.studentName}</div>
                <div className="meta">{mo.studentType==='exam'?'입시생':(mo.studentType==='hobby'?'취미생':'직접입력')} · {md.getMonth()+1}월 {md.getDate()}일 보강</div>
              </div>
              <button className="btn btn-danger btn-sm" disabled={saving} onClick={()=>removeMakeup(mo)}>삭제</button>
            </div>
          );
        })}
        <div className="toggle-row" style={{marginTop:makeupOverrides.length?10:6,marginBottom:10}}>
          {WEEK_LABELS.map((label,off)=>(
            <div key={off} className={"toggle-opt"+(makeupWeek===off?' active':'')} onClick={()=>setMakeupWeek(off)}>{label}</div>
          ))}
        </div>
        <input className="input" placeholder="보강 학생 이름 검색" value={manualName}
          onChange={e=>{ setManualName(e.target.value); setSelectedStudentId(''); }}
          style={{marginBottom: (!selectedStudentId && manualName.trim()) ? 6 : 10}} />
        {!selectedStudentId && manualName.trim() && (()=>{
          const matches = students.filter(s=>s.name.includes(manualName.trim())).slice(0,6);
          return matches.length > 0 ? (
            <div className="student-suggest-list">
              {matches.map(s=>(
                <div key={s.id} className="student-suggest-item" onClick={()=>{ setSelectedStudentId(s.id); setManualName(s.name); }}>
                  <span>{s.name}</span>
                  <span className={"tag "+(s.type==='exam'?'tag-exam':'tag-hobby')}>{s.type==='exam'?'입시생':'취미생'}</span>
                </div>
              ))}
            </div>
          ) : (
            <p style={{fontSize:11.5,color:'var(--text-faint)',marginTop:0,marginBottom:10,lineHeight:1.5}}>일치하는 학생이 없어요. 이대로 등록하면 이름만 기록되고, 그 학생 홈 화면에는 뜨지 않아요.</p>
          );
        })()}
        {selectedStudentId && (
          <div style={{fontSize:11.5,color:'var(--brass-bright)',fontWeight:700,marginBottom:10}}>✓ {manualName} 학생과 연동돼요. 홈 화면에도 바로 표시돼요.</div>
        )}
        <button className="btn" disabled={saving || !manualName.trim()} onClick={addMakeup} style={{marginBottom:20}}>
          {(()=>{ const d = new Date(weekDate(makeupWeek)+'T00:00:00'); return `${d.getMonth()+1}월 ${d.getDate()}일`; })()} {hourLabel12(hour)} 보강으로 지정
        </button>

        <div className="input-label">메모</div>
        <textarea className="input" rows="3" placeholder="이 시간에 대한 메모를 남겨보세요" value={noteText} onChange={e=>setNoteText(e.target.value)} style={{resize:'vertical',marginBottom:8}} />
        <button className="btn btn-ghost btn-sm" disabled={saving} onClick={saveNote} style={{width:'100%'}}>저장</button>
      </div>
    </div>
  );
}

/* ============================================================
   PULL TO REFRESH (아래로 당겨서 새로고침)
   ============================================================ */
function PullToRefresh({ children }){
  const [pullDist, setPullDist] = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const startY = React.useRef(0);
  const active = React.useRef(false);
  const distRef = React.useRef(0);
  const refreshingRef = React.useRef(false);

  useEffect(()=>{
    function onTouchStart(e){
      if(window.scrollY <= 0 && !refreshingRef.current){
        startY.current = e.touches[0].clientY;
        active.current = true;
      }
    }
    function onTouchMove(e){
      if(!active.current) return;
      const dy = e.touches[0].clientY - startY.current;
      if(dy > 0 && window.scrollY <= 0){
        const d = Math.min(dy*0.5, 90);
        distRef.current = d;
        setPullDist(d);
      } else {
        active.current = false;
        distRef.current = 0;
        setPullDist(0);
      }
    }
    function onTouchEnd(){
      if(active.current && distRef.current > 60){
        refreshingRef.current = true;
        setRefreshing(true);
        setTimeout(()=> window.location.reload(), 300);
      } else {
        distRef.current = 0;
        setPullDist(0);
      }
      active.current = false;
    }
    window.addEventListener('touchstart', onTouchStart, { passive:true });
    window.addEventListener('touchmove', onTouchMove, { passive:true });
    window.addEventListener('touchend', onTouchEnd, { passive:true });
    return ()=>{
      window.removeEventListener('touchstart', onTouchStart);
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onTouchEnd);
    };
  }, []);

  return (
    <React.Fragment>
      <div className="ptr-indicator" style={{ height: pullDist }}>
        {refreshing ? <div className="loading-spin" style={{margin:'10px auto'}}/> : (pullDist>8 && <div className="ptr-arrow" style={{transform:`rotate(${Math.min(pullDist*2,180)}deg)`}}>↓</div>)}
      </div>
      {children}
    </React.Fragment>
  );
}

   ============================================================ */
function App(){
  const [session, setSession] = useState(undefined); // undefined = loading, null = logged out
  const [view, setView] = useState('login'); // login | adminLogin

  useEffect(()=>{
    async function restore(){
      try{
        const raw = localStorage.getItem('juniper_session');
        if(!raw){ setSession(null); return; }
        const parsed = JSON.parse(raw);
        if(parsed.type === 'admin'){ setSession({ type:'admin' }); return; }
        if(parsed.type === 'student' && parsed.studentId){
          const doc = await db.collection(COL_STUDENTS).doc(parsed.studentId).get();
          if(doc.exists){ setSession({ type:'student', student:{ id:doc.id, ...doc.data() } }); return; }
        }
        localStorage.removeItem('juniper_session');
        setSession(null);
      }catch(e){ setSession(null); }
    }
    restore();
  }, []);

  function logout(){
    localStorage.removeItem('juniper_session');
    localStorage.removeItem('juniper_student_tab');
    localStorage.removeItem('juniper_admin_tab');
    setSession(null);
    setView('login');
  }

  let content;
  if(FIREBASE_NOT_CONFIGURED){
    content = (
      <div className="auth-wrap">
        <div className="auth-logo">
          <div className="logo-mark"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#C9A227" strokeWidth="1.4"/></svg></div>
          <div className="brand">설정이 필요해요</div>
          <div className="sub">SETUP REQUIRED</div>
        </div>
        <div className="error-box">
          아직 Firebase 프로젝트 설정 전이에요. 코드 상단의 <code>firebaseConfig</code> 값을 본인 Firebase 프로젝트의 실제 값으로 바꿔주셔야 회원가입/로그인이 동작해요. (지금 상태로는 "처리 중"에서 멈춰요)
        </div>
        <p style={{fontSize:12.5,color:'var(--text-muted)',lineHeight:1.7}}>
          Firebase 콘솔 → 프로젝트 설정 → 일반 → 내 앱 → SDK 설정에서 config 값을 복사해 붙여넣고, Firestore 규칙도 파일 상단 주석대로 설정한 뒤 다시 열어주세요.
        </p>
      </div>
    );
  } else if(session === undefined){
    content = <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="loading-spin"/></div>;
  } else if(session === null){
    content = view === 'adminLogin'
      ? <AdminLoginScreen onAdminLogin={()=>setSession({type:'admin'})} onBack={()=>setView('login')} />
      : <AuthScreen onStudentLogin={(student)=>setSession({type:'student', student})} onGoAdmin={()=>setView('adminLogin')} />;
  } else if(session.type === 'admin'){
    content = <AdminShell onLogout={logout} />;
  } else {
    content = <StudentShell student={session.student} onLogout={logout} />;
  }

  return <PullToRefresh>{content}</PullToRefresh>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
